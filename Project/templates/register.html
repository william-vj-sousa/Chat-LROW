<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AUP FrançaisBot | Créer un compte</title>
    <link rel="stylesheet" href="../static/styles.css">
</head>
<body>

    <nav>
        <a href="{{ url_for('landing') }}">
            <img src="{{ url_for('static', filename='aup.png') }}" alt="AUP Logo" class="logo-placeholder">
        </a>
        <div class="nav-links">
            <a href="{{ url_for('login') }}">Se connecter</a>
        </div>
    </nav>

    <div class="auth-header">
        <h1>FrançaisBot</h1>
    </div>

    <div class="auth-container">
        <div class="auth-card">
            <h2>Créer un compte</h2>
            <p class="subtitle">Rejoignez la plateforme et commencez à apprendre.</p>

            <!-- Flash messages from Flask -->
            {% with messages = get_flashed_messages() %}
                {% if messages %}
                    <ul class="flash-list">
                        {% for msg in messages %}
                            <li>{{ msg }}</li>
                        {% endfor %}
                    </ul>
                {% endif %}
            {% endwith %}

            <form method="POST" action="{{ url_for('register') }}">
                <div class="form-group">
                    <label for="username">Nom d'utilisateur</label>
                    <input type="text" id="username" name="username" placeholder="ex: alice.martin" required>
                </div>
                <div class="form-group">
                    <label for="email">Email institutionnel</label>
                    <input type="email" id="email" name="email" placeholder="vous@aup.edu" required>
                </div>
                <div class="form-group">
                    <label for="password">Mot de passe</label>
                    <input type="password" id="password" name="password" placeholder="••••••••" required>
                </div>
                <div class="form-group">
                    <label for="confirm_password">Confirmer le mot de passe</label>
                    <input type="password" id="confirm_password" name="confirm_password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn-submit">Créer mon compte</button>
            </form>

            <div class="auth-switch">
                Déjà un compte ? <a href="{{ url_for('login') }}">Se connecter</a>
            </div>
        </div>
    </div>

</body>
</html>
